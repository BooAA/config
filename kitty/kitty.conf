font_family hack
font_size 12.0
font_features none

cursor_blink_interval 0
cursor_shape block

scrollback_lines -1
# scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
# scrollback_pager nvim --noplugin -c "set signcolumn=no showtabline=0" -c "silent write! /tmp/kitty_scrollback_buffer | te cat /tmp/kitty_scrollback_buffer - " -c "$"
scrollback_pager_history_size 0
# scrollback_pager bash -c "exec nvim 63<&0 0</dev/null -u NONE -c 'map <silent> q :qa!<CR>' -c 'set shell=bash scrollback=100000 termguicolors laststatus=0 clipboard+=unnamedplus' -c 'autocmd TermEnter * stopinsert' -c 'autocmd TermClose * call cursor(max([0,INPUT_LINE_NUMBER-1])+CURSOR_LINE, CURSOR_COLUMN)' -c 'terminal sed </dev/fd/63 -e \"s/'$'\x1b'']8;;file:[^\]*[\]//g\" && sleep 0.01 && printf \"'$'\x1b'']2;\"'"

scrollback_pager nvim +"source /home/liangjlee/.config/kitty/vi-mode.lua"

show_hyperlink_targets yes
allow_hyperlinks yes

copy_on_select clipboard
strip_trailing_spaces always

# Performance tuning config, the default is fine.
# Leave the config here in case I want to change it someday.
# repaint_delay yes
# input_delay 3
# sync_to_monitor yes

enable_audio_bell no
visual_bell_duration 0
window_alert_on_bell no

enabled_layouts splits,stack
window_margin_width 2

hide_window_decorations no

tab_bar_edge bottom
tab_bar_style slant

dynamic_background_opacity yes

update_check_interval 0
startup_session none

shell_integration no-cursor

clear_all_shortcuts yes

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map ctrl+shift+[ scroll_to_prompt -1
map ctrl+shift+] scroll_to_prompt 1
map ctrl+shift+g show_scrollback
# map ctrl+shift+space kitten kitty_grab/grab.py
map ctrl+shift+space show_scrollback
# map ctrl+shift+g show_last_command_output

map ctrl+shift+j scroll_line_down
map ctrl+shift+k scroll_line_up
map ctrl+shift+d scroll_page_down
map ctrl+shift+u scroll_page_up
map ctrl+shift+h scroll_home
map ctrl+shift+l scroll_end

map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward

map ctrl+shift+enter new_window
map ctrl+% launch --location=vsplit
map ctrl+" launch --location=hsplit
map ctrl+shift+w>1 first_window
map ctrl+shift+w>2 second_window
map ctrl+shift+w>3 third_window 
map ctrl+shift+w>4 fourth_window
map ctrl+shift+w>5 fifth_window
map ctrl+shift+w>6 sixth_window
map ctrl+shift+w>7 seventh_window
map ctrl+shift+w>8 eighth_window
map ctrl+shift+w>9 ninth_window
map ctrl+shift+w>w focus_visible_window
map ctro+shift+w>x swap_with_window
map ctrl+shift+n next_window
map ctrl+shift+p previous_window
map ctrl+shift+o next_window
map ctrl+shift+f launch --stdin-source=@screen_scrollback --type=overlay ugrep -n -C5 -Q3 --no-confirm
map ctrl+shift+page_up detach_window tab-left
map ctrl+shift+page_down detach_window tab-right

map shift+left neighboring_window left
map shift+right neighboring_window right
map shift+up neighboring_window up
map shift+down neighboring_window down

map ctrl+shift+left move_window left
map ctrl+shift+right move_window right
map ctrl+shift+up move_window up
map ctrl+shift+down move_window down

map ctrl+shift+s next_layout
map ctrl+shift+r start_resizing_window
map ctrl+shift+e open_url_with_hints

map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+equal change_font_size all 0

map ctrl+shift+a>plus set_background_opacity +0.05
map ctrl+shift+a>minus set_background_opacity -0.05
map ctrl+shift+a>equal set_background_opacity default

map f1 show_kitty_doc overviewap
map f2 set_tab_title
map f5 load_config_file
map f6 debug_config
map f10 toggle_maximized
map f11 toggle_fullscreen
map ctrl+shift+esc kitty_shell window

include current-theme.conf

