# Configuration file for Tmux

# server options
set -s buffer-limit 1000
set -s default-terminal "screen-256color"
set -s escape-time 0
set -s set-clipboard on

# session options
set -g base-index 1
set -g bell-action none
set -g history-limit 1000000
set -g mouse on
set -g pane-base-index 1
set -g prefix "C-z" 
set -g renumber-windows on
set -g status-interval 10
set -g status-justify absolute-centre
set -g status-keys emacs
set -g visual-bell off

# window options
set -g mode-keys emacs
set -g monitor-bell off

# pane options

# key bindings
unbind C-b
unbind o

bind C-z send-prefix
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R
bind -n M-Space copy-mode
bind -n M-\" split-window
bind -n M-% split-window -h
bind -r o select-pane -t :.+
bind F5 source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

set -g @fuzzback-bind /
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '80%'

set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'tmux-plugins/tpm'

if "[ ! -d ~/.config/tmux/plugins/tpm ]" {
        run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'
        run '~/.config/tmux/plugins/tpm/bindings/install_plugins'
}
run '~/.config/tmux/plugins/tpm/tpm'
